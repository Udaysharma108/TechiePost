<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TechieNews // Short News for Smart Techies</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
      body {
        font-family:
          ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      }
      ::-webkit-scrollbar {
        width: 6px;
      }
      ::-webkit-scrollbar-track {
        background: #09090b;
      }
      ::-webkit-scrollbar-thumb {
        background: #27272a;
        border-radius: 3px;
      }
    </style>
  </head>
  <body
    class="bg-zinc-950 text-zinc-50 min-h-screen relative overflow-x-hidden selection:bg-emerald-500 selection:text-zinc-950"
  >
    <!-- Premium Branding App Bar Layout -->
    <header
      class="border-b border-zinc-900 bg-zinc-950/80 backdrop-blur sticky top-0 z-40 shadow-2xl"
    >
      <div
        class="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between"
      >
        <div class="flex items-center gap-4">
          <div
            class="h-9 w-9 rounded-xl bg-gradient-to-br from-emerald-500 to-emerald-600 flex items-center justify-center shadow-[0_0_15px_rgba(16,185,129,0.3)]"
          >
            <span class="text-zinc-950 font-black text-sm tracking-tighter"
              >TN</span
            >
          </div>
          <div class="flex flex-col">
            <h1
              class="text-md font-black tracking-widest text-zinc-100 uppercase"
            >
              TechieNews
            </h1>
            <span
              class="text-[10px] text-emerald-450 font-bold tracking-wide text-zinc-400"
              >Short news for smart techies</span
            >
          </div>
        </div>
        <div class="flex items-center gap-3">
          <span
            class="h-2 w-2 rounded-full bg-emerald-500 animate-pulse"
          ></span>
          <div
            class="text-[10px] text-zinc-400 tracking-widest uppercase border border-zinc-900 rounded-lg px-4 py-1.5 bg-zinc-900/40 font-semibold font-mono"
          >
            Processing Live
          </div>
        </div>
      </div>
    </header>

    <!-- Main Core News Workspace Interface -->
    <main class="max-w-7xl mx-auto px-6 py-12">
      <div class="grid grid-cols-1 lg:grid-cols-2 gap-10">
        <!-- GlobalFeed Segment - Now Matching Emerald Green -->
        <section
          class="bg-zinc-900/10 border border-zinc-900 rounded-2xl p-6 shadow-2xl relative overflow-hidden backdrop-blur-sm"
        >
          <div
            class="absolute top-0 left-0 w-full h-[2px] bg-gradient-to-r from-emerald-950 via-emerald-500 to-transparent"
          ></div>
          <div
            class="flex items-center justify-between border-b border-zinc-900 pb-5 mb-6"
          >
            <div class="flex flex-col gap-1">
              <h2
                class="text-xs font-bold tracking-widest text-emerald-400 uppercase"
              >
                // GlobalFeed
              </h2>
              <span class="text-[10px] text-zinc-500 font-medium"
                >Curated software breakthroughs from around the web</span
              >
            </div>
            <span
              id="global-count"
              class="text-[11px] font-bold font-mono bg-emerald-950/10 text-emerald-450 px-3 py-1 rounded-md border border-emerald-900/30"
              >0 updates</span
            >
          </div>
          <div
            id="global-feed-container"
            class="space-y-4 max-h-[70vh] overflow-y-auto pr-2"
          ></div>
        </section>

        <!-- BharatFeed Segment - Matching Ecosystem Theme -->
        <section
          class="bg-zinc-900/10 border border-zinc-900 rounded-2xl p-6 shadow-2xl relative overflow-hidden backdrop-blur-sm"
        >
          <div
            class="absolute top-0 left-0 w-full h-[2px] bg-gradient-to-r from-emerald-950 via-emerald-500 to-transparent"
          ></div>
          <div
            class="flex items-center justify-between border-b border-zinc-900 pb-5 mb-6"
          >
            <div class="flex flex-col gap-1">
              <h2
                class="text-xs font-bold tracking-widest text-emerald-400 uppercase"
              >
                // BharatFeed
              </h2>
              <span class="text-[10px] text-zinc-500 font-medium"
                >Tracking regional technology developments and milestones</span
              >
            </div>
            <span
              id="bharat-count"
              class="text-[11px] font-bold font-mono bg-emerald-950/10 text-emerald-450 border border-emerald-900/30 px-3 py-1 rounded-md"
              >0 updates</span
            >
          </div>
          <div
            id="bharat-feed-container"
            class="space-y-4 max-h-[70vh] overflow-y-auto pr-2"
          ></div>
        </section>
      </div>
    </main>

    <!-- Refined High-Retention Quick Read Drawer Panel -->
    <div
      id="knowledge-drawer"
      class="fixed top-0 right-0 h-full w-full sm:w-[520px] bg-zinc-950 border-l border-zinc-900 shadow-2xl transform translate-x-full transition-transform duration-300 ease-in-out z-50 p-8 hidden flex-col"
    >
      <div
        class="flex items-center justify-between border-b border-zinc-900 pb-5 mb-6"
      >
        <div class="flex items-center gap-2">
          <span class="h-2 w-2 rounded-full bg-emerald-500"></span>
          <span
            class="text-[10px] font-bold tracking-widest uppercase text-emerald-400"
            >Quick Read Insight</span
          >
        </div>
        <button
          onclick="closeDrawer()"
          class="text-zinc-500 hover:text-zinc-200 font-mono text-xs border border-zinc-850 hover:border-zinc-700 px-3 py-1.5 rounded-lg transition-all cursor-pointer uppercase tracking-wider bg-zinc-900/30"
        >
          Close [ESC]
        </button>
      </div>

      <div class="flex-1 overflow-y-auto space-y-6 pr-1">
        <h3
          id="drawer-title"
          class="text-md font-bold text-zinc-100 leading-snug tracking-tight"
        ></h3>

        <div class="space-y-5">
          <!-- Clean, Humanized Summary Brief Without Robotic Metric Boxes -->
          <div
            class="bg-zinc-900/30 border border-zinc-900 rounded-xl p-6 shadow-inner"
          >
            <p
              id="drawer-summary"
              class="text-xs text-zinc-350 leading-relaxed font-sans font-normal antialiased"
            ></p>
          </div>
        </div>
      </div>

      <div class="border-t border-zinc-900 pt-5 mt-6">
        <a
          id="drawer-source-link"
          href="#"
          target="_blank"
          class="w-full inline-flex items-center justify-center bg-zinc-900 border border-zinc-850 hover:border-zinc-700 text-[11px] font-bold tracking-widest text-zinc-400 hover:text-zinc-200 py-3.5 rounded-xl transition-all uppercase"
        >
          Read More ↗
        </a>
      </div>
    </div>

    <script>
      let articlesCache = [];

      async function loadTechFeeds() {
        const globalContainer = document.getElementById(
          "global-feed-container",
        );
        const bharatContainer = document.getElementById(
          "bharat-feed-container",
        );

        try {
          const response = await fetch("/api/feed/");
          const data = await response.json();

          if (data.status === "success") {
            document.getElementById("global-count").innerText =
              `${data.metrics.total_global} items`;
            document.getElementById("bharat-count").innerText =
              `${data.metrics.total_bharat} items`;

            articlesCache = [
              ...data.feeds.global_tech_frontiers,
              ...data.feeds.bharat_feed,
            ];

            const renderCard = (article) => `
                        <div onclick="openDrawer('${article.url}')" class="p-5 rounded-xl bg-zinc-900/30 border border-zinc-900/80 hover:border-emerald-900/60 hover:bg-zinc-900/50 transition-all duration-200 cursor-pointer group shadow-sm">
                            <span class="text-xs font-bold text-zinc-200 group-hover:text-emerald-400 block mb-2.5 leading-snug tracking-tight transition-colors">
                                ${article.title}
                            </span>
                            <p class="text-[11px] text-zinc-450 line-clamp-2 font-sans leading-relaxed">${article.summary}</p>
                        </div>
                    `;

            globalContainer.innerHTML = data.feeds.global_tech_frontiers
              .map(renderCard)
              .join("");

            if (data.feeds.bharat_feed.length === 0) {
              bharatContainer.innerHTML = `
                            <div class="text-center py-20 border border-dashed border-zinc-900 rounded-xl text-zinc-600 text-[10px] tracking-widest uppercase font-medium">
                                Syncing active regional updates...
                            </div>
                        `;
            } else {
              bharatContainer.innerHTML = data.feeds.bharat_feed
                .map(renderCard)
                .join("");
            }
          }
        } catch (err) {
          console.error(
            "Dashboard engine failed to stream layout metrics:",
            err,
          );
        }
      }

      function openDrawer(articleUrl) {
        const article = articlesCache.find((a) => a.url === articleUrl);
        if (!article) return;

        document.getElementById("drawer-title").innerText = article.title;
        document.getElementById("drawer-summary").innerText = article.summary;
        document.getElementById("drawer-source-link").href = article.url;

        const drawer = document.getElementById("knowledge-drawer");
        drawer.classList.remove("hidden");
        setTimeout(() => {
          drawer.classList.remove("translate-x-full");
        }, 10);
      }

      function closeDrawer() {
        const drawer = document.getElementById("knowledge-drawer");
        drawer.classList.add("translate-x-full");
        setTimeout(() => {
          drawer.classList.add("hidden");
        }, 300);
      }

      window.addEventListener("DOMContentLoaded", loadTechFeeds);
    </script>
  </body>
</html>
